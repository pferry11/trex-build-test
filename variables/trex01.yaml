# Host connection details
host: 10.0.0.26
name: trex01

# PCI devices expected on this host (from lspci)
pci_nics:
  - "03:00.0"   # Intel 82599ES Port 0
  - "03:00.1"   # Intel 82599ES Port 1

# OS-visible network interfaces (from /sys/class/net)
expected_interfaces:
  - "ens224"    # VMXNET3 interface

# Hugepages configuration
Hugepages:  2048

# Expected Python version for runtime dependency check
python_version: 6.9

# Expected pip version for runtime dependency check
pip_version: 9.0.1

# Required pip packages for TRex
pip_packages:
  - distro
  - scapy

# TRex installation paths
trex_dir: /opt/Trex
trex_version: 3.06
trex_local_cfg: trex_cfg.yaml
trex_cfg: /etc/trex_cfg.yaml

# Expected contents of the TRex configuration file (trex_cfg.yaml)
trex_expected_cfg:
  version: 2

  interfaces:
    - "03:00.0"
    - "03:00.1"

  port_info:
    - ip: 1.1.1.1
      default_gw: 2.2.2.2
    - ip: 2.2.2.2
      default_gw: 1.1.1.1

  platform:
    master_thread_id: 0
    latency_thread_id: 1
    dual_if:
      - socket: 0
        threads: [2, 3]
