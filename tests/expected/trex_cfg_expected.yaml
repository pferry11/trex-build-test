### TRex Dual-Port Configuration
### Using PCI Passthrough Intel 82599ES 10Gb NICs

- port_limit: 2
  version: 2
  interfaces:
    - "0000.03:00.0"    # Port 0
    - "0000.03:00.1"    # Port 1

  port_info:
    - ip: 1.1.1.1
      default_gw: 1.1.1.2
    - ip: 2.2.2.1
      default_gw: 2.2.2.2

  platform:
    master_thread_id: 0
    latency_thread_id: 1
    dual_if:
      - socket: 0
        threads: [2,3]